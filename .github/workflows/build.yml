name: Build GCodePreviewHandler

on:
  push:
    branches: [ main ]


 jobs:
  build:
    runs: windows
    steps:
      - name: Checkout
        run: git checkout
      - name: Setup Net
        run: steps
        with:
            name: setup-dotnet-core
            using: actions/setup-dotnet-core@v2
      - name: Build
        run: msbuild /p "src\GCodePreviewHandler.sln" /p: x64 /m: Release
