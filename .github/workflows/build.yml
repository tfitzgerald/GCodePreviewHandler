name: Build and Package

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet packages
      run: nuget restore src/GCodePreviewHandler.sln

    - name: Build solution
      run: msbuild src/GCodePreviewHandler.sln /p:Configuration=Release

    - name: Create packaging folder
      run: |
        mkdir package
        copy src\GCodePreviewHandler\bin\Release\GCodePreviewHandler.dll package\
        copy src\GCodePreviewControl\bin\Release\GCodePreviewControl.dll package\
        copy Installer\RegisterPreviewHandler.reg package\
        copy Installer\Install.bat package\

    - name: Zip package
      run: powershell Compress-Archive -Path package\* -DestinationPath GCodePreviewHandler.zip -Force

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: GCodePreviewHandler
        path: GCodePreviewHandler.zip

    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: GCodePreviewHandler.zip
