name: Build Preview Handler

on:
  push:
    branches: [ main ]
  pull_request:
  release:
    types: [ published ]

permissions:
  contents: write   # required for softprops/action-gh-release to upload assets

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.3.1

    - name: Restore NuGet packages
      run: nuget restore src/GCodePreviewHandler.sln

    - name: Build solution
      run: msbuild src/GCodePreviewHandler.sln /p:Configuration=Release

    - name: Package ZIP
      shell: pwsh
      run: |
        $staging = "staging/GCodePreviewHandler"
        New-Item -ItemType Directory -Path $staging | Out-Null
        Copy-Item src/GCodePreviewHandler/bin/Release/GCodePreviewHandler.dll  $staging/
        Copy-Item src/GCodePreviewControl/bin/Release/GCodePreviewControl.dll  $staging/
        Copy-Item Installer/install.ps1   $staging/
        Copy-Item Installer/uninstall.ps1 $staging/
        Compress-Archive -Path "$staging/*" -DestinationPath staging/GCodePreviewHandler.zip

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: GCodePreviewHandler
        path: staging/GCodePreviewHandler.zip

    - name: Attach ZIP to GitHub Release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: staging/GCodePreviewHandler.zip
