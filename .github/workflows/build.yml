name: Build DLLs Only

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet
      run: nuget restore "src/GCodePreviewHandler.sln"

    - name: Build solution (log errors)
      run: msbuild "src/GCodePreviewHandler.sln" /p:Configuration=Release /fl /flp:logfile=msbuild.err;errorsonly

    - name: Show MSBuild errors
      run: |
        echo "=== MSBUILD ERRORS ==="
        if (Test-Path msbuild.err) { type msbuild.err } else { echo "No msbuild.err file found" }

    - name: Show ALL build output
      run: |
        echo "=== FULL BIN OUTPUT ==="
        dir "src" -Recurse | findstr /i ".dll"
