name: Build Preview Handler

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.3.1

    - name: Restore NuGet packages
      run: nuget restore src/GCodePreviewHandler.sln

    - name: Build solution
      run: msbuild src/GCodePreviewHandler.sln /p:Configuration=Release

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: gcode-preview-handler
        path: |
          src/GCodePreviewHandler/bin/Release/*.dll
          src/GCodePreviewControl/bin/Release/*.dll
