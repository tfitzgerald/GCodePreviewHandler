name: Build GCodePreviewHandler

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore NuGet packages
        run: dotnet restore src/GCodePreviewHandler.sln

      - name: Build solution
        run: dotnet build src/GCodePreviewHandler.sln --configuration Release

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: GCodePreviewHandler-build
          path: |
            src/GCodePreviewHandler/bin/Release/
            src/GCodePreviewControl/bin/Release/
